version: "2"

linters:
  default: standard
  enable:
    - misspell
    - revive
    - gosec
  exclusions:
    rules:
      # Test helpers legitimately exec the compiled binary and read fixtures.
      - path: _test\.go
        linters: [gosec]
      - path: test/
        linters: [gosec]

formatters:
  enable:
    - gofmt
    - goimports
